{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-4">
   
    <h2 class="text-center">Register</h2>

    <form method="POST">
        {% csrf_token %}

        <input class="form-control mb-3" type="text" name="first_name" placeholder="First Name">
        <input class="form-control mb-3" type="text" name="last_name" placeholder="Last Name">
        <input class="form-control mb-3" type="email" name="email" placeholder="Email Address">
        <input class="form-control mb-3" type="text" name="username" placeholder="Username">
        <input class="form-control mb-3" type="password" name="password" placeholder="Password">
        <div class="d-grid gap-2 col-6 mx-auto">
            <button class="btn btn-primary text-center justify-content-center">Register</button>
        </div>
        <br>
        <p class="text-center">
            <a href="/auth/login">Login</a>
            &nbsp;&nbsp;•&nbsp;&nbsp;
            <a href="/auth/forget_password">Forget Password</a>
        </p>
    </form>
  </div>
</div>
{% endblock %}
