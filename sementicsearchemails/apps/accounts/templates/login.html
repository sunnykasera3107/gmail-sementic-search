{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-4">
   
    <h2 class="text-center">Login</h2>

    {% if error %}
        <div class="alert alert-danger" role="alert">
            {{error}}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input class="form-control mb-3" type="text" name="username" placeholder="Username">
        <input class="form-control mb-3" type="password" name="password" placeholder="Password">
        <div class="d-grid gap-2 col-6 mx-auto">
            <button class="btn btn-primary text-center justify-content-center">Login</button>
        </div>
        <br>
        <p class="text-center">
            <a href="/auth/register">SignUp</a>
            &nbsp;&nbsp;•&nbsp;&nbsp;
            <a href="/auth/forget_password">Forget Password</a>
        </p>
        

    </form>
  </div>
</div>
{% endblock %}
